                if (answered) {
                  if (oi === q.correct) cls = 'correct';
                  else if (quizStates[qKey] === oi && oi !== q.correct) cls = 'wrong';
                }
                return `<button class="quiz-opt ${cls}" ${answered ? 'disabled' : ''} onclick="answerQuiz('${qKey}', ${oi}, ${q.correct}, this)">${opt}</button>`;
              }).join('')}
            </div>
            ${answered ? `<div class="quiz-feedback ${quizStates[qKey] === true ? 'correct' : 'wrong'}">
              ${quizStates[qKey] === true ? '✓ Corretto! Bravo/a!' : '✗ Non esatto. The correct answer is highlighted above.'}
            </div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;

  // Navigation
  html += `
    <div class="footer-nav">
      <button class="footer-btn" ${currentUnit === 0 ? 'disabled' : ''} onclick="goUnit(${currentUnit - 1})">← Previous Unit</button>
      <button class="footer-btn primary" ${currentUnit === COURSE.length - 1 ? 'disabled' : ''} onclick="goUnit(${currentUnit + 1})">Next Unit →</button>
    </div>
  `;

  html += '</div>';
  } // end else (unit view)
  document.getElementById('app').innerHTML = html;
}

function goUnit(i) {
  if (i < 0 || i >= COURSE.length) return;
  showingVerbTable = false;
  currentUnit = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleVerbTable() {
  showingVerbTable = !showingVerbTable;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setVerbFilter(f) {
  verbFilter = f;
  render();
}

function setVerbTense(t) {
  verbTense = t;
  render();
}

function updateVerbSearch(val) {
  verbSearch = val;
  render();
  // re-focus and restore cursor
  const input = document.querySelector('.verb-search-box');
  if (input) { input.focus(); input.setSelectionRange(val.length, val.length); }
}

function toggleVocab(key, el) {
  vocabStates[key] = !vocabStates[key];
  el.classList.toggle('hidden');
  const hint = el.querySelector('.hint');
  if (hint) hint.remove();
}

function answerQuiz(qKey, chosen, correct, el) {
  if (quizStates[qKey] !== undefined) return;
  quizStates[qKey] = chosen === correct ? true : chosen;

  // Update buttons in-place without re-rendering
  const quizBox = el.closest('.quiz-box');
  const buttons = quizBox.querySelectorAll('.quiz-opt');
  buttons.forEach((btn, oi) => {
    btn.disabled = true;
    if (oi === correct) btn.classList.add('correct');
    else if (oi === chosen && chosen !== correct) btn.classList.add('wrong');
  });

  // Add feedback message
  const isCorrect = chosen === correct;
  const feedback = document.createElement('div');
  feedback.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
  feedback.textContent = isCorrect ? '✓ Corretto! Bravo/a!' : '✗ Non esatto. The correct answer is highlighted above.';
  quizBox.appendChild(feedback);
}

render();
</script>
</body>
</html>
